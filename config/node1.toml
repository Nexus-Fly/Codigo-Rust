# ─────────────────────────────────────────────
# Vertex Swarm Demo – Node 1 (Drone)
# Replace secret_key and public_key values with
# real keys generated by: cargo run --bin keygen
# ─────────────────────────────────────────────

node_id    = "node1"
secret_key = "REPLACE_WITH_REAL_SECRET_KEY_FROM_KEYGEN"
bind       = "127.0.0.1:8001"
agent_kind = "Drone"
vendor     = "FleetOps"
x          = 40.7128
y          = -74.0060
battery    = 100
capacity   = 1

[[peers]]
id         = "node2"
address    = "127.0.0.1:8002"
public_key = "REPLACE_WITH_NODE2_PUBLIC_KEY"

[[peers]]
id         = "node3"
address    = "127.0.0.1:8003"
public_key = "REPLACE_WITH_NODE3_PUBLIC_KEY"

[[peers]]
id         = "node4"
address    = "127.0.0.1:8004"
public_key = "REPLACE_WITH_NODE4_PUBLIC_KEY"
